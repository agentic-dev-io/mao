name: Docker Build and Push

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker tags
        id: tags
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            TAGS="ghcr.io/${{ github.repository }}:${VERSION}"
            if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              MAJOR=$(echo $VERSION | cut -d. -f1)
              MINOR=$(echo $VERSION | cut -d. -f2)
              TAGS="$TAGS,ghcr.io/${{ github.repository }}:${MAJOR}.${MINOR}"
            fi
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="ghcr.io/${{ github.repository }}:latest"
          else
            BRANCH=$(echo ${GITHUB_REF#refs/heads/} | sed -r 's/[\/]/-/g')
            TAGS="ghcr.io/${{ github.repository }}:${BRANCH}"
          fi
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          TAGS="$TAGS,ghcr.io/${{ github.repository }}:sha-${SHA_SHORT}"
          echo "TAGS=${TAGS}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: |
          PUSH_FLAG=""
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            PUSH_FLAG="--push"
          fi
          docker buildx build \
            --platform ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) && 'linux/amd64,linux/arm64' || 'linux/amd64' }} \
            ${PUSH_FLAG} \
            --tag $(echo $TAGS | sed 's/,/ --tag /g') \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -f ./docker/Dockerfile.api \
            .

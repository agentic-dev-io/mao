name: Setup MAO Development Environment
description: Pre-install dependencies and setup development environment for MAO project

steps:
  - name: Install uv package manager
    run: |
      curl -LsSf https://astral.sh/uv/install.sh | sh
      export PATH="$HOME/.local/bin:$PATH"

  - name: Install project dependencies
    run: |
      cd $GITHUB_WORKSPACE
      uv sync

  - name: Verify installations
    run: |
      cd $GITHUB_WORKSPACE
      uv run python -c "import fastapi; import duckdb; import langchain; print('Dependencies OK')"

  - name: Setup environment file
    run: |
      cd $GITHUB_WORKSPACE
      if [ ! -f .env ]; then
        cp .env.example .env
      fi

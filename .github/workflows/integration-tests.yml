name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ labeled, synchronize, opened, reopened ]
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' ||
      contains(github.event.pull_request.labels.*.name, 'test-integration') ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 30

    env:
      MCP_DB_PATH: ./data/mcp_config.duckdb
      MCP_CONFIG_PATH: ./mcp.json
      OLLAMA_HOST: http://localhost:11434
      TEST_LLM_PROVIDER: ollama
      TEST_LLM_MODEL: qwen3:0.6b
      PYTHONUNBUFFERED: 1

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Start Ollama container
        run: |
          docker pull ollama/ollama:latest
          docker run -d --name ollama -p 11434:11434 ollama/ollama:latest

      - name: Set up Node.js (for MCP server)
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Create data directory
        run: mkdir -p data

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pytest pytest-asyncio pytest-cov pytest-timeout pytest-xdist

      - name: Setup MCP configuration for tests
        run: |
          echo '{
            "mcpServers": {
              "memory": {
                "command": "npx",
                "args": ["-y", "@modelcontextprotocol/server-memory"]
              }
            }
          }' > ./mcp.json

      - name: Pull Ollama model
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:11434/api/version > /dev/null; then
              break
            fi
            sleep 1
          done
          docker exec ollama ollama pull qwen3:0.6b

      - name: Wait for Ollama
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:11434/api/version > /dev/null; then
              echo "Ollama is ready!"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Ollama failed to start."
              docker logs ollama
              exit 1
            fi
            sleep 2
          done

      - name: Run integration tests
        run: |
          uv run pytest --cov=src --timeout=120 -v \
            tests/test_storage.py \
            tests/test_agents.py \
            tests/test_mcp.py \
            tests/api/test_live_api.py

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: integration-tests
